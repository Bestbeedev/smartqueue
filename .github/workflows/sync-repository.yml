name: Sync Repository from Upstream

on:
  # Déclenchement par push sur la branche main du repository principal
  schedule:
    # Vérification toutes les 5 minutes (cron: */5 * * * *)
    - cron: '*/5 * * * *'
  
  # Déclenchement manuel depuis l'interface GitHub
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Forcer la synchronisation complète (même si aucune différence)'
        required: false
        default: false
        type: boolean

  # Déclenchement par webhook (si configuré)
  repository_dispatch:
    types: [sync-request]

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0  # Récupérer tout l'historique pour éviter les conflits
          
      - name: 🔧 Configure Git
        run: |
          git config --global user.name "GitHub Actions Sync Bot"
          git config --global user.email "actions@github.com"
          
      - name: 📡 Add upstream remote
        run: |
          # Vérifier si upstream existe déjà
          if ! git remote show upstream 2>/dev/null; then
            git remote add upstream https://github.com/stephdeve/SmartQueue.git
          else
            git remote set-url upstream https://github.com/stephdeve/SmartQueue.git
          fi
          
          # Afficher les remotes pour debug
          git remote -v
          
      - name: 🔄 Fetch from upstream
        run: |
          # Récupérer toutes les branches et tags depuis upstream
          git fetch upstream --prune --tags
          
          # Afficher les dernières informations
          echo "=== Derniers commits upstream ==="
          git log --oneline upstream/main -5
          echo "=== Derniers commits local ==="
          git log --oneline main -5
          
      - name: 🔍 Check for differences
        id: check_diff
        run: |
          # Comparer les derniers commits
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          LOCAL_COMMIT=$(git rev-parse main)
          
          echo "Upstream commit: $UPSTREAM_COMMIT"
          echo "Local commit: $LOCAL_COMMIT"
          
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Les repositories sont déjà synchronisés"
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
            echo "🔄 Des changements sont disponibles"
            
            # Afficher les différences
            echo "=== Différences ==="
            git log --oneline main..upstream/main
          fi
          
      - name: 🔄 Sync repository
        if: steps.check_diff.outputs.no_changes == 'false' || github.event.inputs.force_sync == 'true'
        run: |
          echo "🚀 Début de la synchronisation..."
          
          # Strategy 1: Fast-forward si possible
          if git merge-base --is-ancestor main upstream/main; then
            echo "✅ Fast-forward possible"
            git merge upstream/main --ff-only
          else
            echo "⚠️ Fast-forward impossible, utilisation de merge strategy"
            
            # Strategy 2: Merge avec résolution automatique
            git merge upstream/main --no-ff -m "🔄 Auto-sync from upstream $(date '+%Y-%m-%d %H:%M:%S')"
          fi
          
          # Afficher le résultat
          echo "=== Résultat du merge ==="
          git log --oneline -5
          
      - name: 🚀 Push to origin
        if: steps.check_diff.outputs.no_changes == 'false' || github.event.inputs.force_sync == 'true'
        run: |
          echo "📤 Push vers le repository miroir..."
          
          # Push avec force seulement si nécessaire (évite les boucles infinies)
          if git merge-base --is-ancestor origin/main main 2>/dev/null; then
            echo "✅ Push normal"
            git push origin main
          else
            echo "⚠️ Push avec force nécessaire"
            git push origin main --force-with-lease
          fi
          
      - name: 📊 Sync Summary
        if: always()
        run: |
          echo "=== Résumé de la synchronisation ==="
          echo "Repository source: https://github.com/stephdeve/SmartQueue.git"
          echo "Repository cible: https://github.com/Bestbeedev/smartqueue.git"
          echo "Date: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "Trigger: ${{ github.event_name }}"
          
          if [ "${{ steps.check_diff.outputs.no_changes }}" = "true" ]; then
            echo "Status: ✅ Déjà à jour"
          else
            echo "Status: 🔄 Synchronisé avec succès"
          fi
          
          # Statistiques
          echo "=== Statistiques ==="
          echo "Commets totaux: $(git rev-list --count HEAD)"
          echo "Dernier commit: $(git rev-parse --short HEAD)"
          echo "Branch: $(git branch --show-current)"
          
      - name: 🎯 Notify Vercel (optional)
        if: steps.check_diff.outputs.no_changes == 'false' || github.event.inputs.force_sync == 'true'
        run: |
          # Notification Vercel pour redéploiement automatique
          echo "🔄 Notification envoyée pour déploiement Vercel"
          # Vercel détecte automatiquement le push et redéploie
          
  # Job de monitoring pour éviter les boucles infinies
  monitor:
    runs-on: ubuntu-latest
    needs: sync
    if: always()
    
    steps:
      - name: 📊 Check sync health
        run: |
          echo "=== Monitoring de la synchronisation ==="
          echo "Sync job status: ${{ needs.sync.result }}"
          
          if [ "${{ needs.sync.result }}" = "failure" ]; then
            echo "❌ La synchronisation a échoué"
            echo "Vérifiez les logs ci-dessus pour plus de détails"
            exit 1
          else
            echo "✅ La synchronisation s'est terminée avec succès"
          fi
