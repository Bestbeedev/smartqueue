name: 🔄 Sync Repository from Upstream

on:
  # Vérification automatique toutes les 5 minutes
  schedule:
    - cron: '*/5 * * * *'
  
  # Déclenchement manuel depuis l'interface GitHub
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Forcer la synchronisation complète (même si aucune différence)'
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔧 Configure Git
        run: |
          git config --global user.name "GitHub Actions Sync Bot"
          git config --global user.email "actions@github.com"

      - name: 📡 Add upstream remote
        run: |
          if ! git remote show upstream 2>/dev/null; then
            git remote add upstream https://github.com/stephdeve/SmartQueue.git
          else
            git remote set-url upstream https://github.com/stephdeve/SmartQueue.git
          fi
          git remote -v

      - name: 🔄 Fetch from upstream
        run: |
          git fetch upstream --prune --tags
          echo "=== Derniers commits upstream ==="
          git log --oneline upstream/main -5
          echo "=== Derniers commits local ==="
          git log --oneline main -5

      - name: 🔍 Check for differences
        id: check_diff
        run: |
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          LOCAL_COMMIT=$(git rev-parse main)
          echo "Upstream commit: $UPSTREAM_COMMIT"
          echo "Local commit: $LOCAL_COMMIT"
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Déjà synchronisé"
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
            echo "🔄 Changements détectés"
            git log --oneline main..upstream/main
          fi

      - name: 🔄 Sync repository
        if: steps.check_diff.outputs.no_changes == 'false' || github.event.inputs.force_sync == 'true'
        run: |
          echo "🚀 Début de la synchronisation..."
          # Fast-forward si possible
          if git merge-base --is-ancestor main upstream/main; then
            echo "✅ Fast-forward possible"
            git merge upstream/main --ff-only
          else
            echo "⚠️ Fast-forward impossible, merge avec autorisation des historiques différents"
            git merge upstream/main --allow-unrelated-histories -m "🔄 Auto-sync from upstream $(date '+%Y-%m-%d %H:%M:%S')"
          fi
          echo "=== Résultat du merge ==="
          git log --oneline -5

      - name: 🚀 Push to origin
        if: steps.check_diff.outputs.no_changes == 'false' || github.event.inputs.force_sync == 'true'
        run: |
          echo "📤 Push vers le repository miroir..."
          if git merge-base --is-ancestor origin/main main 2>/dev/null; then
            git push origin main
          else
            git push origin main --force-with-lease

      - name: 📊 Sync Summary
        if: always()
        run: |
          echo "=== Résumé ==="
          echo "Source: https://github.com/stephdeve/SmartQueue.git"
          echo "Miroir: https://github.com/Bestbeedev/smartqueue.git"
          echo "Date: $(date '+%Y-%m-%d %H:%M:%S')"
          if [ "${{ steps.check_diff.outputs.no_changes }}" = "true" ]; then
            echo "Status: ✅ Déjà à jour"
          else
            echo "Status: 🔄 Synchronisé avec succès"
          fi

      - name: 🎯 Notify Vercel (optional)
        if: steps.check_diff.outputs.no_changes == 'false' || github.event.inputs.force_sync == 'true'
        run: |
          echo "🔄 Push détecté → Vercel déclenchera le déploiement automatiquement"
