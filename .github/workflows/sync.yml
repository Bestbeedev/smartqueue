name: Sync Repository from Upstream

on:
  schedule:
    - cron: '*/5 * * * *' # toutes les 5 minutes
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Forcer la synchronisation complète (même si aucune différence)'
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [sync-request]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          repository: Bestbeedev/smartqueue
          fetch-depth: 0 # récupérer tout l'historique

      - name: 🔧 Configure Git
        run: |
          git config --global user.name "GitHub Actions Sync Bot"
          git config --global user.email "actions@github.com"

      - name: 📡 Add upstream remote
        run: |
          if ! git remote show upstream 2>/dev/null; then
            git remote add upstream https://github.com/stephdeve/SmartQueue.git
          else
            git remote set-url upstream https://github.com/stephdeve/SmartQueue.git
          fi
          git remote -v

      - name: 🔄 Fetch from upstream
        run: |
          git fetch upstream --prune --tags
          echo "=== Derniers commits upstream ==="
          git log --oneline upstream/main -5
          echo "=== Derniers commits local ==="
          git log --oneline main -5

      - name: 🔍 Check for differences
        id: check_diff
        run: |
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          LOCAL_COMMIT=$(git rev-parse main)
          echo "Upstream commit: $UPSTREAM_COMMIT"
          echo "Local commit: $LOCAL_COMMIT"
          if [ "$UPSTREAM_COMMIT" = "$LOCAL_COMMIT" ]; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Déjà synchronisé"
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
            echo "🔄 Changements détectés"
            git log --oneline main..upstream/main
          fi

      - name: 🔄 Sync repository
        if: steps.check_diff.outputs.no_changes == 'false' || github.event.inputs.force_sync == 'true'
        run: |
          echo "🚀 Début de la synchronisation..."
          # Merge avec option pour le premier run (histoires différentes)
          git merge upstream/main --no-ff --allow-unrelated-histories -m "🔄 Auto-sync from upstream $(date '+%Y-%m-%d %H:%M:%S')"
          echo "=== Résultat du merge ==="
          git log --oneline -5

      - name: 🚀 Push to origin
        if: steps.check_diff.outputs.no_changes == 'false' || github.event.inputs.force_sync == 'true'
        run: |
          git push origin main --force-with-lease
          echo "📤 Push terminé"

      - name: 📊 Sync Summary
        if: always()
        run: |
          echo "=== Résumé ==="
          echo "Repository source: https://github.com/stephdeve/SmartQueue.git"
          echo "Repository cible: https://github.com/Bestbeedev/smartqueue.git"
          echo "Date: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "Trigger: ${{ github.event_name }}"
          if [ "${{ steps.check_diff.outputs.no_changes }}" = "true" ]; then
            echo "Status: ✅ Déjà à jour"
          else
            echo "Status: 🔄 Synchronisé avec succès"
          fi

      - name: 🎯 Notify Vercel (optional)
        if: steps.check_diff.outputs.no_changes == 'false' || github.event.inputs.force_sync == 'true'
        run: |
          echo "🔄 Notification envoyée à Vercel pour redéploiement automatique"

  monitor:
    runs-on: ubuntu-latest
    needs: sync
    if: always()
    steps:
      - name: 📊 Check sync health
        run: |
          echo "=== Monitoring de la synchronisation ==="
          echo "Sync job status: ${{ needs.sync.result }}"
          if [ "${{ needs.sync.result }}" = "failure" ]; then
            echo "❌ La synchronisation a échoué"
            exit 1
          else
            echo "✅ Synchronisation réussie"
